<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decor Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="chat-shell" aria-label="Decor Agent chat">
        <div class="shell-header">
          <p class="eyebrow">Decora</p>
          <h1>Design Chat</h1>
          <p class="subcopy">
            Ask for room styling, color palette ideas, furniture picks, or decor advice.
          </p>
        </div>
        <nav class="tabs" style="display:flex;gap:8px;margin-bottom:12px;">
          <a href="/" style="text-decoration:none;padding:8px 16px;border-radius:10px;font-weight:600;background:var(--accent);color:#fff;">Decor Agent</a>
          <a href="/temporal" style="text-decoration:none;padding:8px 16px;border-radius:10px;font-weight:600;color:var(--text-body);border:1px solid rgba(91,58,29,0.15);">Decor Agent (Pro)</a>
        </nav>

        <div id="messages" class="messages" role="log" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <label for="tier" class="tier-label">Tier</label>
          <select id="tier" name="tier">
            <option value="free" selected>Free</option>
            <option value="premium">Premium</option>
          </select>
          <input
            id="prompt"
            name="message"
            type="text"
            placeholder="Describe your room or ask for inspiration..."
            autocomplete="off"
            required
            maxlength="2000"
          />
          <button id="send" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/web/app.js" defer></script>
  </body>
</html>
